<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Volleyball Drills</title>
  <style>
    :root { --glass: rgba(255,255,255,0.08); --line: rgba(255,255,255,0.18); }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; min-height: 100vh; color: #eef3f6;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #2b6c7d 0%, #16323b 55%, #0d1f25 100%);
    }

    /* ---------- mobile-first (single column) ---------- */
    header { padding: 18px 16px 4px; }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 650; line-height: 1.25; letter-spacing: .2px; }
    header p { margin: 6px 0 0; color: #9fc0cc; font-size: .9rem; }

    .wrap { display: flex; flex-direction: column; gap: 16px; padding: 14px 16px 36px; }
    .card {
      background: var(--glass); border: 1px solid var(--line); border-radius: 16px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
    }

    .court-card { padding: 12px; width: 100%; max-width: 520px; margin: 0 auto; }
    #court { line-height: 0; }
    #court svg { display: block; width: 100%; height: auto; max-height: 74vh; margin: 0 auto; }

    .controls { display: flex; gap: 10px; margin-top: 12px; }
    button {
      flex: 1; min-height: 46px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.10); color: #eef3f6; font-size: 1rem; font-weight: 600;
      cursor: pointer; touch-action: manipulation; transition: transform .06s ease, background .15s ease;
    }
    button:hover { background: rgba(255,255,255,0.18); }
    button:active { transform: translateY(1px); }
    button.primary { background: #2fae7a; border-color: #2fae7a; }
    button.primary:hover { background: #33c489; }
    button:disabled { opacity: .45; cursor: default; }

    /* drill picker trigger (opens the browser sheet) */
    .drill-picker { display: flex; align-items: center; gap: 10px; width: 100%;
      min-height: 48px; margin-bottom: 12px; padding: 8px 14px; border-radius: 12px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.10); color: #eef3f6;
      cursor: pointer; text-align: left; }
    .drill-picker:hover { background: rgba(255,255,255,0.16); }
    .dp-label { flex: 0 0 auto; font-size: .7rem; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: #9fc0cc; }
    .dp-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-weight: 600; font-size: 1rem; }
    .dp-caret { flex: 0 0 auto; color: #9fc0cc; font-size: .8rem; }

    /* drill browser — bottom sheet on mobile, dialog on desktop */
    .sheet-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.55);
      display: flex; align-items: flex-end; justify-content: center; }
    .sheet-backdrop[hidden] { display: none; }
    .sheet { display: flex; flex-direction: column; width: 100%; max-height: 82vh;
      background: #15323b; border: 1px solid var(--line); border-radius: 18px 18px 0 0;
      box-shadow: 0 -12px 40px rgba(0,0,0,.45); animation: sheetUp .18s ease-out; }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes sheetIn { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .sheet-head { display: flex; gap: 10px; padding: 14px; border-bottom: 1px solid var(--line); }
    #drillSearch { flex: 1; min-width: 0; min-height: 44px; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.08); color: #eef3f6; font-size: 1rem; }
    #drillSearch:focus { outline: 2px solid #2fae7a; outline-offset: 1px; }
    #sheetClose { flex: 0 0 auto; width: 44px; min-height: 44px; padding: 0; border-radius: 10px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.08); color: #eef3f6;
      font-size: 1.1rem; cursor: pointer; }
    .sheet-list { overflow-y: auto; padding: 6px 8px 16px; -webkit-overflow-scrolling: touch; }
    .sheet-cat { position: sticky; top: 0; padding: 12px 12px 6px; background: #15323b;
      font-size: .7rem; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #7fb0bf; }
    .sheet-row { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
      min-height: 48px; padding: 11px 12px; border: none; border-radius: 12px; background: transparent;
      color: #eef3f6; font-size: 1rem; font-weight: 500; cursor: pointer; }
    .sheet-row:hover { background: rgba(255,255,255,0.06); }
    .sheet-row.active { background: rgba(47,174,122,.18); }
    .sheet-row .rname { flex: 1 1 auto; min-width: 0; }
    .sheet-row .check { flex: 0 0 auto; color: #2fae7a; opacity: 0; }
    .sheet-row.active .check { opacity: 1; }
    .sheet-empty { padding: 26px 12px; text-align: center; color: #9fc0cc; }

    .info { padding: 16px 18px; width: 100%; max-width: 520px; margin: 0 auto; }
    .info h2 { margin: 0 0 4px; font-size: 1.02rem; }
    .info .sub { color: #9fc0cc; font-size: .88rem; margin: 0 0 14px; }
    ol { margin: 0; padding-left: 18px; }
    ol li { margin: 7px 0; color: #dbe7ec; font-size: .9rem; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px 14px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
    .legend span { display: inline-flex; align-items: center; gap: 7px; font-size: .82rem; color: #cfe0e6; }
    .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #f5f5f5; flex: 0 0 auto; }
    .status { margin-top: 12px; font-size: .8rem; color: #8fb4c0; }
    footer { padding: 0 16px 24px; color: #7fa0ac; font-size: .78rem; }
    footer a { color: #9fd0dd; }

    /* ---------- wide screens (court + info side by side) ---------- */
    @media (min-width: 880px) {
      header { padding: 28px 32px 8px; }
      header h1 { font-size: 1.5rem; }
      header p { max-width: 720px; }
      .wrap { flex-direction: row; flex-wrap: wrap; gap: 28px; padding: 20px 32px 48px; align-items: flex-start; }
      .court-card { width: 460px; max-width: 460px; padding: 18px; margin: 0; }
      #court svg { max-height: none; }
      .info { width: auto; max-width: 440px; margin: 0; padding: 22px 24px; }
      /* centered dialog instead of a bottom sheet */
      .sheet-backdrop { align-items: center; }
      .sheet { max-width: 520px; max-height: 70vh; border-radius: 18px; animation: sheetIn .16s ease-out; }
    }

    /* ---------- short landscape (e.g. phone turned sideways) ---------- */
    @media (orientation: landscape) and (max-height: 600px) {
      .wrap { flex-direction: row; align-items: flex-start; gap: 16px; }
      .court-card { width: auto; max-width: none; margin: 0; }
      #court svg { width: auto; height: 82vh; max-height: 82vh; }
      .info { margin: 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Volleyball Drills</h1>
    <p>An animated library of volleyball drills, rendered with the VBRotations engine.
       Pick a drill to watch it play out on the court.</p>
  </header>

  <div class="wrap">
    <div class="card court-card">
      <button id="drillPicker" class="drill-picker" aria-haspopup="dialog">
        <span class="dp-label">Drill</span>
        <span class="dp-name" id="dpName">Choose a drill…</span>
        <span class="dp-caret">▾</span>
      </button>
      <div id="court"></div>
      <div class="controls">
        <button id="playBtn" class="primary">▶ Play</button>
        <button id="stepBtn">⏭ Step</button>
        <button id="resetBtn">↺ Reset</button>
      </div>
    </div>

    <div class="card info">
      <h2 id="drillName"></h2>
      <p class="sub" id="drillSummary"></p>
      <ol id="phaseList"></ol>
      <div class="legend" id="legend"></div>
      <div class="status" id="status">Loading…</div>
    </div>
  </div>

  <footer>
    Rendered with <a href="https://github.com/monkeysppp/VBRotations" target="_blank" rel="noopener">VBRotations</a>
    (Apache-2.0). Drill choreography and runner added on top.
  </footer>

  <div class="sheet-backdrop" id="sheet" hidden role="dialog" aria-modal="true" aria-label="Choose a drill">
    <div class="sheet">
      <div class="sheet-head">
        <input id="drillSearch" type="search" placeholder="Search drills…" autocomplete="off" aria-label="Search drills">
        <button id="sheetClose" aria-label="Close">✕</button>
      </div>
      <div class="sheet-list" id="sheetList"></div>
    </div>
  </div>

  <script src="vendor/snap.svg-min.js"></script>
  <script src="vendor/vbCourts.js"></script>
  <script src="engine.js"></script>
  <script src="drills/wash-attack-block.js"></script>
  <script src="drills/block-close-pin.js"></script>
  <script src="drills/butterfly-serve-pass.js"></script>
  <script>
    const statusEl = document.getElementById('status')
    const playBtn = document.getElementById('playBtn')
    const stepBtn = document.getElementById('stepBtn')
    const resetBtn = document.getElementById('resetBtn')

    const pickerBtn = document.getElementById('drillPicker')
    const dpName = document.getElementById('dpName')
    const sheet = document.getElementById('sheet')
    const sheetList = document.getElementById('sheetList')
    const searchInput = document.getElementById('drillSearch')
    const sheetClose = document.getElementById('sheetClose')

    let current = null

    const BALL_LEGEND = { c: '#fffb00', t: 'Ball' }

    function renderInfo (drill) {
      document.getElementById('drillName').textContent = drill.name
      document.getElementById('drillSummary').textContent = drill.summary
      const list = document.getElementById('phaseList')
      list.innerHTML = ''
      drill.phases.forEach(function (t) {
        const li = document.createElement('li'); li.textContent = t; list.appendChild(li)
      })
      const legend = document.getElementById('legend')
      legend.innerHTML = ''
      const entries = (drill.legend || []).concat([BALL_LEGEND])
      entries.forEach(function (e) {
        const span = document.createElement('span')
        const dot = document.createElement('span')
        dot.className = 'dot'; dot.style.background = e.c
        span.appendChild(dot)
        span.appendChild(document.createTextNode(e.t))
        legend.appendChild(span)
      })
    }

    // ---- drill browser (searchable, categorised) ----
    function renderList (filter) {
      const q = (filter || '').trim().toLowerCase()
      sheetList.innerHTML = ''
      let shown = 0
      drillCategories().forEach(function (cat) {
        const matches = cat.drills.filter(function (d) {
          return !q || d.name.toLowerCase().indexOf(q) !== -1 || cat.name.toLowerCase().indexOf(q) !== -1
        })
        if (!matches.length) return
        const head = document.createElement('div')
        head.className = 'sheet-cat'; head.textContent = cat.name
        sheetList.appendChild(head)
        matches.forEach(function (d) {
          shown++
          const row = document.createElement('button')
          row.className = 'sheet-row' + (current && d.id === current.id ? ' active' : '')
          const name = document.createElement('span'); name.className = 'rname'; name.textContent = d.name
          const check = document.createElement('span'); check.className = 'check'; check.textContent = '✓'
          row.appendChild(name); row.appendChild(check)
          row.addEventListener('click', function () { closeSheet(); selectDrill(d.id, true) })
          sheetList.appendChild(row)
        })
      })
      if (!shown) {
        const empty = document.createElement('div')
        empty.className = 'sheet-empty'
        empty.textContent = 'No drills match “' + filter + '”.'
        sheetList.appendChild(empty)
      }
    }

    function openSheet () {
      searchInput.value = ''
      renderList('')
      sheet.hidden = false
      document.body.style.overflow = 'hidden'
      setTimeout(function () { searchInput.focus() }, 40)
    }
    function closeSheet () {
      sheet.hidden = true
      document.body.style.overflow = ''
    }

    pickerBtn.addEventListener('click', openSheet)
    sheetClose.addEventListener('click', closeSheet)
    sheet.addEventListener('click', function (e) { if (e.target === sheet) closeSheet() })
    searchInput.addEventListener('input', function () { renderList(searchInput.value) })
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !sheet.hidden) closeSheet() })

    const runner = new DrillPlayer({
      mountEl: document.getElementById('court'),
      courtWidth: 460,
      courtColours: { backgroundColour: '#2f7f8f', courtColour: '#e08444', lineColour: '#ffffff' },
      onState: function (state) {
        statusEl.textContent = 'Status: ' + state
        const playing = state === 'playing'
        playBtn.textContent = playing ? '⏸ Pause' : '▶ Play'
        stepBtn.disabled = playing
      }
    })

    async function selectDrill (id, updateHash) {
      const drill = getDrill(id) || DRILLS[0]
      if (!drill) return
      current = drill
      dpName.textContent = drill.name
      renderInfo(drill)
      if (updateHash && location.hash.slice(1) !== drill.id) {
        history.replaceState(null, '', '#' + drill.id)
      }
      await runner.load(drill)
    }

    playBtn.addEventListener('click', function () {
      if (runner.running) runner.pause()
      else runner.play()
    })
    stepBtn.addEventListener('click', function () { runner.step() })
    resetBtn.addEventListener('click', function () { runner.reset() })

    // deep-linking: #<drill-id> selects that drill; back/forward & shared links work
    window.addEventListener('hashchange', function () {
      const id = location.hash.slice(1)
      if (id && (!current || id !== current.id)) selectDrill(id, false)
    })

    window.addEventListener('load', function () {
      const fromHash = location.hash.slice(1)
      selectDrill(getDrill(fromHash) ? fromHash : (DRILLS[0] && DRILLS[0].id), true)
    })
  </script>
</body>
</html>
