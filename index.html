<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Volleyball Drills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --bg:#101418; --panel:#161B21; --raised:#1C2830; --stage:#141A20;
      --border:#1F262D; --border2:#2A333C;
      --text:#E8EDF1; --text2:#AEB9C2; --muted:#5F6B76; --muted2:#7A8794;
      --accent:#34C388; --accent-glow:#34C38866; --accent-soft:#7DD3B0; --ball:#fffb00;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .flex1 { flex: 1; }
    code { font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--muted); }

    /* ================= app shell (mobile-first) ================= */
    .app { min-height: 100vh; }
    .rail { display: none; }

    .main { display: flex; flex-direction: column; gap: 14px; padding: 14px 16px 36px; min-width: 0; }

    .brand { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }

    .topbar { display: flex; align-items: center; gap: 8px; padding: 2px 2px 0; }

    .gear {
      width: 44px; height: 44px; flex: none; border-radius: 10px; border: 1px solid var(--border2);
      background: var(--panel); color: var(--text2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
    }
    .gear:hover { background: #1A222A; }
    .gear svg { width: 17px; height: 17px; }

    .cols { display: flex; flex-direction: column; gap: 14px; }
    .court-col { width: 100%; max-width: 440px; margin: 0 auto; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
    .info-col-wrap { }

    /* mobile drill picker */
    .pick {
      display: flex; align-items: center; gap: 10px; width: 100%; min-height: 48px; padding: 6px 14px;
      border-radius: 12px; border: 1px solid var(--border2); background: var(--panel); color: var(--text);
      cursor: pointer; text-align: left; font-family: inherit;
    }
    .pick:hover { background: #1A222A; }
    .pick-label { flex: none; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .pick-name { flex: 1; min-width: 0; font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pick-caret { flex: none; width: 12px; height: 8px; }

    /* court stage */
    .stage { position: relative; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); background: var(--stage); }
    .court { line-height: 0; min-height: 280px; }
    .court svg { display: block; width: 100%; height: auto; }

    /* on-court phase ticker */
    .ticker {
      position: absolute; left: 10px; right: 10px; bottom: 104px; display: flex; justify-content: center;
      pointer-events: none;
    }
    .ticker[hidden] { display: none; }
    .ticker-inner {
      display: flex; align-items: center; gap: 8px; max-width: 100%;
      background: rgba(10,13,16,.82); border: 1px solid var(--border2); border-radius: 999px; padding: 6px 13px;
    }
    .ticker-num { flex: none; font-size: 10.5px; font-weight: 700; color: var(--accent-soft); font-family: ui-monospace, Menlo, monospace; }
    .ticker-text { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* transport */
    .transport { position: absolute; left: 0; right: 0; bottom: 0; padding: 30px 12px 12px;
      background: linear-gradient(transparent, rgba(10,13,16,.94) 45%); }
    .segs { display: flex; gap: 4px; margin-bottom: 10px; }
    .seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border2); }
    .seg.on { background: var(--accent); }
    .controls { display: flex; align-items: center; gap: 9px; }
    .tbtn {
      width: 44px; height: 44px; flex: none; border-radius: 10px; border: 1px solid var(--border2);
      background: rgba(22,27,33,.6); color: var(--text2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; padding: 0; font-family: inherit;
    }
    .tbtn:hover { background: rgba(34,42,50,.8); }
    .tbtn:active { transform: scale(.95); }
    .pbtn {
      width: 44px; height: 44px; flex: none; border-radius: 50%; border: none; background: var(--accent);
      color: #101418; display: flex; align-items: center; justify-content: center; cursor: pointer;
      font-size: 15px; padding: 0; font-family: inherit;
    }
    .pbtn:active { transform: scale(.95); }
    .speed { display: flex; border: 1px solid var(--border2); border-radius: 9px; overflow: hidden; background: rgba(22,27,33,.6); }
    .speed button {
      padding: 12px 11px; border: none; background: transparent; font-size: 11px; font-weight: 600;
      font-family: ui-monospace, Menlo, monospace; color: var(--muted); cursor: pointer;
    }
    .speed button.on { color: var(--accent-soft); background: var(--raised); }
    .rep { flex: none; font-size: 11px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; }

    /* warmup (routine) card — shown instead of the court for kind:'routine' */
    .stage[hidden] { display: none; }
    .wcard {
      display: flex; flex-direction: column; gap: 14px; min-height: 280px;
      border: 1px solid var(--border); border-radius: 14px; background: var(--stage);
      padding: 20px 20px 14px;
    }
    .wcard[hidden] { display: none; }
    .wcard-top { display: flex; align-items: center; }
    .wcard-num { font-size: 11px; font-weight: 700; color: var(--accent-soft); font-family: ui-monospace, Menlo, monospace; }
    .wcard-dur {
      font-size: 11px; font-weight: 700; color: var(--text2); font-family: ui-monospace, Menlo, monospace;
      border: 1px solid var(--border2); border-radius: 999px; padding: 4px 10px;
    }
    .wcard-name { margin: 0; font-size: 23px; font-weight: 700; letter-spacing: -.01em; line-height: 1.3; }
    .wcard-cues { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .wcard-cues li { position: relative; padding-left: 18px; font-size: 14px; color: var(--text2); line-height: 1.5; }
    .wcard-cues li::before {
      content: ''; position: absolute; left: 2px; top: .5em; width: 7px; height: 7px;
      border-radius: 50%; background: var(--accent);
    }
    .wcard-nav { margin-top: auto; display: flex; align-items: center; gap: 12px; padding-top: 10px; }
    .wcard-nav .segs { flex: 1; margin-bottom: 0; }
    .wnav[disabled] { opacity: .35; cursor: default; }

    /* info column */
    .info { width: 100%; max-width: 440px; margin: 0 auto; border: 1px solid var(--border); border-radius: 14px;
      background: #12171D; padding: 20px 20px 18px; }
    .info-name { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -.01em; line-height: 1.3; }
    .info-sum { margin: 6px 0 0; font-size: 13px; color: var(--muted2); line-height: 1.55; }
    .stepper { display: flex; flex-direction: column; margin-top: 16px; }
    .pstep { display: flex; gap: 12px; padding: 5px 0; }
    .pdot {
      width: 20px; height: 20px; flex: none; border-radius: 50%; box-sizing: border-box;
      background: #12171D; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #101418; margin-top: 1px;
    }
    .pdot.done { background: var(--accent); border-color: var(--accent); }
    .pdot.active { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
    .ptext { font-size: 13.5px; line-height: 1.5; color: var(--text2); }
    .ptext.done { color: var(--muted); }
    .ptext.active { color: var(--text); font-weight: 600; }
    .info-setup {
      margin: 12px 0 0; padding: 8px 12px; border-left: 3px solid var(--accent); border-radius: 6px;
      background: var(--panel); font-size: 12.5px; color: var(--text2); line-height: 1.5;
    }
    .info-setup[hidden] { display: none; }
    /* warmup exercise rows in the stepper are buttons (tappable) */
    .wstep { background: none; border: none; width: 100%; cursor: pointer; font-family: inherit; text-align: left; border-radius: 8px; }
    .wstep:hover { background: #1A222A; }
    .wstep .pdot { color: var(--muted2); }
    .wstep .pdot.done { color: #101418; }
    .wstep .wdur { flex: none; font-size: 11px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; margin-top: 3px; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 16px; padding-top: 15px; border-top: 1px solid var(--border); }
    .legend[hidden] { display: none; }
    .legend span.chip { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
    .legend .ldot { width: 11px; height: 11px; flex: none; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.55); }

    /* ================= drill list (rail + sheet share this) ================= */
    .cat { font-size: 10.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 12px 10px 4px; }
    .row {
      display: flex; justify-content: space-between; align-items: center; gap: 8px; width: 100%; text-align: left;
      padding: 9px 10px; border: none; border-radius: 8px; background: transparent; color: var(--text2);
      font-size: 13.5px; font-weight: 400; line-height: 1.35; cursor: pointer; font-family: inherit;
    }
    .row:hover { background: #1A222A; }
    .row.active { background: var(--raised); color: var(--accent-soft); font-weight: 600; }
    .row-name { min-width: 0; }
    .row-dot { width: 6px; height: 6px; flex: none; border-radius: 50%; background: transparent; }
    .row.active .row-dot { background: var(--accent); }
    .empty { padding: 26px 12px; text-align: center; color: var(--muted2); font-size: 13px; }

    /* ================= sheets (mobile drill picker + settings) ================= */
    .scrim { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.6); display: flex; align-items: flex-end; justify-content: center; }
    .scrim[hidden] { display: none; }
    #setScrim { z-index: 60; }
    .sheet {
      display: flex; flex-direction: column; width: 100%; max-width: 560px; max-height: 80vh;
      background: var(--panel); border: 1px solid var(--border2); border-radius: 18px 18px 0 0;
      box-shadow: 0 -12px 40px rgba(0,0,0,.5); animation: sheetUp .18s ease-out;
    }
    .sheet-narrow { max-width: 420px; padding-bottom: 26px; }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes sheetIn { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .sheet-head { display: flex; align-items: center; gap: 10px; padding: 14px; border-bottom: 1px solid var(--border); }
    .search {
      flex: 1; min-width: 0; min-height: 44px; border: 1px solid var(--border2); background: #101418; border-radius: 10px;
      padding: 0 12px; color: var(--text); font-size: 15px; font-family: inherit; outline: none;
    }
    .search:focus { border-color: var(--accent); }
    .sheet-close { border-radius: 10px; font-size: 15px; }
    .set-head { padding: 14px 14px 12px 18px; }
    .set-title { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
    .sheet-list { overflow-y: auto; padding: 6px 10px 20px; -webkit-overflow-scrolling: touch; }
    .sheet-list .row { min-height: 48px; padding: 6px 12px; border-radius: 10px; font-size: 15px; }

    /* settings */
    .set-body { display: flex; flex-direction: column; gap: 20px; padding: 18px; }
    .set-group { display: flex; flex-direction: column; gap: 10px; }
    .set-label { font-size: 10.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .swatches { display: flex; gap: 14px; }
    .swatch { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border2); box-sizing: border-box; cursor: pointer; padding: 0; }
    .swatch.sel { border-color: var(--text); }
    .segmented { display: flex; border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; }
    .segmented button {
      flex: 1; display: flex; align-items: center; justify-content: center; min-height: 44px; border: none;
      background: transparent; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit;
    }
    .segmented button.on { color: var(--accent-soft); background: var(--raised); }
    .toggle-row { display: flex; align-items: center; gap: 12px; min-height: 44px; cursor: pointer; background: none; border: none; padding: 0; text-align: left; font-family: inherit; }
    .toggle-txt { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .toggle-title { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .toggle-sub { font-size: 12px; color: var(--muted2); }
    .switch { width: 46px; height: 28px; flex: none; border-radius: 999px; background: var(--border2); padding: 3px; box-sizing: border-box; transition: background .15s; }
    .switch.on { background: var(--accent); }
    .switch .knob { display: block; width: 22px; height: 22px; border-radius: 50%; background: var(--text); transition: transform .15s; }
    .switch.on .knob { transform: translateX(18px); }
    .set-note { font-size: 11px; color: var(--muted); line-height: 1.5; }

    /* ================= desktop (>= 1000px) ================= */
    @media (min-width: 1000px) {
      .app { display: grid; grid-template-columns: 252px minmax(0, 1fr); min-height: 100vh; }
      .rail {
        display: flex; flex-direction: column; gap: 4px; border-right: 1px solid var(--border);
        padding: 20px 14px; overflow-y: auto; max-height: 100vh; position: sticky; top: 0;
      }
      .rail-head { display: flex; align-items: center; gap: 8px; padding: 0 4px 14px 10px; }
      .rail-head .brand { font-size: 14px; }
      .rail .gear { width: 34px; height: 34px; border-radius: 9px; background: transparent; }
      .rail .gear svg { width: 16px; height: 16px; }
      .rail .search { flex: none; margin-bottom: 10px; min-height: 0; padding: 9px 11px; font-size: 13px;
        border-radius: 8px; background: var(--panel); }
      .drill-list { display: flex; flex-direction: column; }
      .rail-foot { margin-top: auto; padding: 16px 10px 0; font-size: 11px; color: #3E4A55; line-height: 1.5; }
      .rail-foot code { color: var(--muted); }

      .topbar, .pick { display: none; }
      .cols { flex-direction: row; gap: 28px; align-items: flex-start; }
      .court-col { width: 410px; max-width: 410px; margin: 0; flex: none; }
      .info { flex: 1; max-width: 520px; margin: 0; }

      /* settings shows as a centred dialog on desktop */
      #setScrim { align-items: center; }
      #setSheet { border-radius: 18px; animation: sheetIn .16s ease-out; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- ===== desktop rail ===== -->
    <aside class="rail">
      <div class="rail-head">
        <span class="brand">Volleyball Drills</span>
        <span class="flex1"></span>
        <button class="gear" id="railGear" type="button" title="Display settings" aria-label="Display settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v3M12 18.2v3M2.8 12h3M18.2 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"></path></svg>
        </button>
      </div>
      <input class="search" id="railSearch" type="search" placeholder="Search drills & warmups" autocomplete="off" aria-label="Search drills and warmups">
      <nav class="drill-list" id="railList" aria-label="Drills"></nav>
      <div class="rail-foot">Rendered with VBRotations (Apache-2.0). Drop a drill file into <code>drills/</code> (or a warmup into <code>warmups/</code>) and it appears here.</div>
    </aside>

    <!-- ===== main ===== -->
    <main class="main">
      <!-- mobile top bar -->
      <div class="topbar">
        <span class="brand">Volleyball Drills</span>
        <span class="flex1"></span>
        <button class="gear" id="topGear" type="button" title="Display settings" aria-label="Display settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v3M12 18.2v3M2.8 12h3M18.2 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"></path></svg>
        </button>
      </div>

      <div class="cols">
        <!-- court column -->
        <div class="court-col">
          <button class="pick" id="pickBtn" type="button" aria-haspopup="dialog">
            <span class="pick-label" id="pickLabel">Drill</span>
            <span class="pick-name" id="pickName">Loading…</span>
            <svg class="pick-caret" viewBox="0 0 12 8" fill="none"><path d="M1 1.5 L6 6.5 L11 1.5" stroke="#5F6B76" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </button>

          <!-- warmup (routine) card — replaces the court for kind:'routine' -->
          <div class="wcard" id="wcard" hidden>
            <div class="wcard-top">
              <span class="wcard-num" id="wNum"></span>
              <span class="flex1"></span>
              <span class="wcard-dur" id="wDur"></span>
            </div>
            <h2 class="wcard-name" id="wName"></h2>
            <ul class="wcard-cues" id="wCues"></ul>
            <div class="wcard-nav">
              <button class="tbtn wnav" id="wPrev" type="button" title="Previous exercise" aria-label="Previous exercise">⏮</button>
              <div class="segs" id="wSegs"></div>
              <button class="tbtn wnav" id="wNext" type="button" title="Next exercise" aria-label="Next exercise">⏭</button>
            </div>
          </div>

          <div class="stage" id="stage">
            <div class="court" id="court"></div>

            <div class="ticker" id="ticker" hidden>
              <div class="ticker-inner">
                <span class="ticker-num" id="tickerNum"></span>
                <span class="ticker-text" id="tickerText"></span>
              </div>
            </div>

            <div class="transport">
              <div class="segs" id="segs"></div>
              <div class="controls">
                <button class="tbtn" id="backBtn" type="button" title="Back one phase" aria-label="Back one phase">⏮</button>
                <button class="pbtn" id="playBtn" type="button" aria-label="Play">▶</button>
                <button class="tbtn" id="fwdBtn" type="button" title="Forward one phase" aria-label="Forward one phase">⏭</button>
                <button class="tbtn" id="resetBtn" type="button" title="Reset" aria-label="Reset">↺</button>
                <span class="flex1"></span>
                <div class="speed" id="speed" role="group" aria-label="Playback speed"></div>
                <span class="rep" id="rep">rep 0</span>
              </div>
            </div>
          </div>
        </div>

        <!-- info column -->
        <section class="info">
          <h1 class="info-name" id="infoName"></h1>
          <p class="info-sum" id="infoSum"></p>
          <p class="info-setup" id="infoSetup" hidden></p>
          <div class="stepper" id="stepper"></div>
          <div class="legend" id="legend"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- ===== mobile drill sheet ===== -->
  <div class="scrim" id="drillScrim" hidden role="dialog" aria-modal="true" aria-label="Choose a drill">
    <div class="sheet" id="drillSheet">
      <div class="sheet-head">
        <input class="search" id="sheetSearch" type="search" placeholder="Search drills & warmups" autocomplete="off" aria-label="Search drills and warmups">
        <button class="tbtn sheet-close" id="drillSheetClose" type="button" aria-label="Close">✕</button>
      </div>
      <div class="sheet-list" id="sheetList"></div>
    </div>
  </div>

  <!-- ===== settings sheet ===== -->
  <div class="scrim" id="setScrim" hidden role="dialog" aria-modal="true" aria-label="Display settings">
    <div class="sheet sheet-narrow" id="setSheet">
      <div class="sheet-head set-head">
        <span class="set-title">Display settings</span>
        <span class="flex1"></span>
        <button class="tbtn sheet-close" id="setClose" type="button" aria-label="Close">✕</button>
      </div>
      <div class="set-body">
        <div class="set-group">
          <span class="set-label">Accent colour</span>
          <div class="swatches" id="swatches"></div>
        </div>
        <div class="set-group">
          <span class="set-label">Court style</span>
          <div class="segmented" id="courtSeg"></div>
        </div>
        <button class="toggle-row" id="tickerToggle" type="button" aria-pressed="true">
          <span class="toggle-txt">
            <span class="toggle-title">Phase ticker</span>
            <span class="toggle-sub">Show the current phase name on the court</span>
          </span>
          <span class="switch" id="tickerSwitch"><span class="knob"></span></span>
        </button>
        <div class="set-note">Saved on this device.</div>
      </div>
    </div>
  </div>

  <script src="vendor/snap.svg-min.js"></script>
  <script src="vendor/vbCourts.js"></script>
  <script src="engine.js"></script>
  <script src="drills/wash-attack-block.js"></script>
  <script src="drills/backrow-attack-rally.js"></script>
  <script src="drills/block-close-pin.js"></script>
  <script src="drills/block-read-setter.js"></script>
  <script src="drills/butterfly-serve-pass.js"></script>
  <script src="warmups/pair-pass-set-warmup.js"></script>
  <script src="warmups/pair-throw-toss-warmup.js"></script>
  <script src="warmups/pepper-warmup.js"></script>
  <script src="warmups/movement-footwork-warmup.js"></script>
  <script src="warmups/target-serve-pass-warmup.js"></script>
  <script>
  'use strict'
  ;(function () {
    // ---- persistence keys ----
    var K = { drill: 'v1c-drill', accent: 'v1c-accent', court: 'v1c-court', ticker: 'v1c-ticker' }
    var ACCENTS = ['#34C388', '#4FB8D6', '#F5D547']
    var COURTS = {
      midnight: { backgroundColour: '#141A20', courtColour: '#1E2831', lineColour: '#5A6E80' },
      classic:  { backgroundColour: '#2f7f8f', courtColour: '#e08444', lineColour: '#ffffff' }
    }
    var BALL_LEGEND = { c: '#fffb00', t: 'Ball' }
    var SPEEDS = [{ v: 0.5, label: '.5×' }, { v: 1, label: '1×' }, { v: 2, label: '2×' }]

    function lsGet (k) { try { return localStorage.getItem(k) } catch (e) { return null } }
    function lsSet (k, v) { try { localStorage.setItem(k, v) } catch (e) {} }

    // ---- state ----
    var state = {
      currentId: null,
      runState: 'ready',
      activeSet: [],
      doneMax: -1,
      rep: 0,
      wIndex: 0,
      speed: 1,
      accent: ACCENTS.indexOf(lsGet(K.accent)) !== -1 ? lsGet(K.accent) : '#34C388',
      courtStyle: (lsGet(K.court) === 'classic' || lsGet(K.court) === 'midnight') ? lsGet(K.court) : 'midnight',
      ticker: lsGet(K.ticker) == null ? true : lsGet(K.ticker) === '1'
    }

    var $ = function (id) { return document.getElementById(id) }
    var courtEl = $('court'), stageEl = $('stage')
    var pickName = $('pickName'), pickLabel = $('pickLabel')
    var infoName = $('infoName'), infoSum = $('infoSum'), infoSetup = $('infoSetup')
    var stepperEl = $('stepper'), segsEl = $('segs'), legendEl = $('legend')
    var wcardEl = $('wcard'), wNum = $('wNum'), wDur = $('wDur'), wName = $('wName')
    var wCues = $('wCues'), wSegs = $('wSegs'), wPrev = $('wPrev'), wNext = $('wNext')
    var tickerEl = $('ticker'), tickerNum = $('tickerNum'), tickerText = $('tickerText')
    var playBtn = $('playBtn'), backBtn = $('backBtn'), fwdBtn = $('fwdBtn'), resetBtn = $('resetBtn')
    var repEl = $('rep'), speedEl = $('speed')
    var railList = $('railList'), sheetList = $('sheetList')
    var railSearch = $('railSearch'), sheetSearch = $('sheetSearch')

    var runner = null

    // ---- helpers ----
    function el (tag, cls, text) {
      var e = document.createElement(tag)
      if (cls) e.className = cls
      if (text != null) e.textContent = text
      return e
    }

    function getItem (id) { return getDrill(id) || getWarmup(id) }
    function isRoutine () {
      var it = state.currentId && getItem(state.currentId)
      return !!(it && it.kind === 'routine')
    }
    function fmtDur (s) {
      if (!s) return ''
      return s % 60 === 0 ? (s / 60) + ' min' : s + ' s'
    }

    // ---- drill + warmup list (shared by the rail and the mobile sheet) ----
    function addRows (container, cats, label, q) {
      var shown = 0
      cats.forEach(function (cat) {
        var head = label ? label + ' · ' + cat.name : cat.name
        var rows = cat.drills.filter(function (d) {
          return !q || d.name.toLowerCase().indexOf(q) !== -1 || head.toLowerCase().indexOf(q) !== -1
        })
        if (!rows.length) return
        container.appendChild(el('div', 'cat', head))
        rows.forEach(function (d) {
          shown++
          var row = el('button', 'row' + (d.id === state.currentId ? ' active' : ''))
          row.type = 'button'
          row.appendChild(el('span', 'row-name', d.name))
          row.appendChild(el('span', 'row-dot'))
          row.addEventListener('click', function () { closeDrillSheet(); selectItem(d.id, true) })
          container.appendChild(row)
        })
      })
      return shown
    }

    function buildList (container, query) {
      var q = (query || '').trim().toLowerCase()
      container.innerHTML = ''
      // warmups pinned first — practice starts with the warmup
      var shown = addRows(container, warmupCategories(), 'Warmups', q)
      shown += addRows(container, drillCategories(), '', q)
      if (!shown) container.appendChild(el('div', 'empty', 'Nothing matches “' + query + '”.'))
    }

    function refreshLists () {
      buildList(railList, railSearch.value)
      if (!$('drillScrim').hidden) buildList(sheetList, sheetSearch.value)
    }

    // ---- info panel (drills) ----
    function renderInfo (drill) {
      infoName.textContent = drill.name
      infoSum.textContent = drill.summary
      infoSetup.hidden = true
      legendEl.hidden = false
      legendEl.innerHTML = ''
      ;(drill.legend || []).concat([BALL_LEGEND]).forEach(function (e) {
        var chip = el('span', 'chip')
        var dot = el('span', 'ldot'); dot.style.background = e.c
        chip.appendChild(dot); chip.appendChild(document.createTextNode(e.t))
        legendEl.appendChild(chip)
      })
      renderPhases()
    }

    // ---- info panel + card (warmups) ----
    function renderWarmupInfo (w) {
      infoName.textContent = w.name
      infoSum.textContent = w.summary || ''
      infoSetup.textContent = w.setupNote || ''
      infoSetup.hidden = !w.setupNote
      legendEl.innerHTML = ''
      legendEl.hidden = true
      segsEl.innerHTML = ''
      renderWarmup()
    }

    function renderWarmup () {
      var w = state.currentId ? getWarmup(state.currentId) : null
      if (!w) return
      var ex = w.exercises || []
      var cur = Math.min(state.wIndex, ex.length - 1)

      stepperEl.innerHTML = ''
      ex.forEach(function (e, i) {
        var done = i < cur, active = i === cur
        var row = el('button', 'pstep wstep')
        row.type = 'button'
        var dot = el('span', 'pdot' + (done ? ' done' : (active ? ' active' : '')), done ? '✓' : String(i + 1))
        var txt = el('span', 'ptext' + (active ? ' active' : (done ? ' done' : '')), e.name)
        row.appendChild(dot); row.appendChild(txt)
        row.appendChild(el('span', 'flex1'))
        row.appendChild(el('span', 'wdur', fmtDur(e.duration)))
        row.addEventListener('click', function () { state.wIndex = i; renderWarmup() })
        stepperEl.appendChild(row)
      })

      var e = ex[cur]
      wNum.textContent = (cur + 1) + ' / ' + ex.length
      wDur.textContent = fmtDur(e.duration)
      wName.textContent = e.name
      wCues.innerHTML = ''
      ;(e.cues || []).forEach(function (c) { wCues.appendChild(el('li', null, c)) })
      wSegs.innerHTML = ''
      ex.forEach(function (_, i) { wSegs.appendChild(el('div', 'seg' + (i <= cur ? ' on' : ''))) })
      wPrev.disabled = cur === 0
      wNext.disabled = cur === ex.length - 1
    }

    // ---- phase stepper + progress segments ----
    function renderPhases () {
      var drill = state.currentId ? getDrill(state.currentId) : null
      var phases = drill ? drill.phases : []
      segsEl.innerHTML = ''
      stepperEl.innerHTML = ''
      phases.forEach(function (text, i) {
        var active = state.activeSet.indexOf(i) !== -1
        var done = !active && i <= state.doneMax
        var seg = el('div', 'seg' + ((active || done) ? ' on' : ''))
        segsEl.appendChild(seg)

        var step = el('div', 'pstep')
        var dot = el('span', 'pdot' + (done ? ' done' : (active ? ' active' : '')), done ? '✓' : '')
        var txt = el('span', 'ptext' + (active ? ' active' : (done ? ' done' : '')), text)
        step.appendChild(dot); step.appendChild(txt)
        stepperEl.appendChild(step)
      })
    }

    // ---- on-court ticker ----
    function renderTicker () {
      var drill = state.currentId ? getDrill(state.currentId) : null
      var on = state.ticker && drill && drill.phases.length > 0
      tickerEl.hidden = !on
      if (!on) return
      var playing = state.runState === 'playing'
      var text = playing ? '' : 'Press play'
      var num = playing ? '' : '▶'
      if (state.activeSet.length && drill) {
        var first = state.activeSet[0]
        var last = state.activeSet[state.activeSet.length - 1]
        var raw = drill.phases[first] || ''
        text = raw.split('—')[0].trim() || raw
        num = state.activeSet.length > 1
          ? (first + 1) + '–' + (last + 1) + '/' + drill.phases.length
          : (first + 1) + '/' + drill.phases.length
      }
      tickerText.textContent = text
      tickerNum.textContent = num
    }

    function updateBackOpacity () {
      backBtn.style.opacity = (runner && runner.cursor > 0) ? '1' : '0.35'
    }

    // ---- engine callbacks ----
    function onState (s) {
      state.runState = s
      var playing = s === 'playing'
      playBtn.textContent = playing ? '⏸' : '▶'
      playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play')
      updateBackOpacity()
      renderTicker()
    }
    function onPhase (idx) {
      if (isRoutine()) return // a paused drill's last callbacks must not touch the warmup view
      state.activeSet = idx || []
      state.doneMax = state.activeSet.length ? Math.min.apply(null, state.activeSet) - 1 : -1
      renderPhases(); renderTicker(); updateBackOpacity()
    }
    function onRep (n) {
      if (isRoutine()) return
      state.rep = n
      repEl.textContent = 'rep ' + n
      state.activeSet = []; state.doneMax = -1
      renderPhases(); renderTicker(); updateBackOpacity()
    }

    // ---- drill / warmup selection ----
    async function selectItem (id, updateHash) {
      var item = getItem(id) || DRILLS[0] || WARMUPS[0]
      if (!item) return
      state.currentId = item.id
      lsSet(K.drill, item.id)
      pickName.textContent = item.name
      pickLabel.textContent = item.kind === 'routine' ? 'Warmup' : 'Drill'
      refreshLists()
      if (updateHash && location.hash.slice(1) !== item.id) {
        history.replaceState(null, '', '#' + item.id)
      }
      if (item.kind === 'routine') {
        if (runner && runner.running) runner.pause()
        stageEl.hidden = true
        wcardEl.hidden = false
        state.wIndex = 0
        renderWarmupInfo(item)
      } else {
        wcardEl.hidden = true
        stageEl.hidden = false
        renderInfo(item)
        await runner.load(item)
      }
    }

    // ---- transport wiring ----
    playBtn.addEventListener('click', function () {
      if (!runner) return
      if (runner.running) runner.pause(); else runner.play()
    })
    fwdBtn.addEventListener('click', function () { if (runner) runner.stepForward() })
    backBtn.addEventListener('click', function () { if (runner) runner.stepBack() })
    resetBtn.addEventListener('click', function () { if (runner) runner.reset() })

    // ---- warmup navigation ----
    wPrev.addEventListener('click', function () {
      if (state.wIndex > 0) { state.wIndex--; renderWarmup() }
    })
    wNext.addEventListener('click', function () {
      var w = state.currentId ? getWarmup(state.currentId) : null
      if (w && state.wIndex < w.exercises.length - 1) { state.wIndex++; renderWarmup() }
    })

    function buildSpeed () {
      speedEl.innerHTML = ''
      SPEEDS.forEach(function (s) {
        var b = el('button', state.speed === s.v ? 'on' : '', s.label)
        b.type = 'button'
        b.addEventListener('click', function () {
          if (runner) runner.speed = s.v
          state.speed = s.v
          buildSpeed()
        })
        speedEl.appendChild(b)
      })
    }

    // ---- sheets ----
    function openDrillSheet () {
      sheetSearch.value = ''
      buildList(sheetList, '')
      $('drillScrim').hidden = false
      document.body.style.overflow = 'hidden'
      setTimeout(function () { sheetSearch.focus() }, 40)
    }
    function closeDrillSheet () {
      $('drillScrim').hidden = true
      if ($('setScrim').hidden) document.body.style.overflow = ''
    }
    function openSettings () { $('setScrim').hidden = false; document.body.style.overflow = 'hidden' }
    function closeSettings () {
      $('setScrim').hidden = true
      if ($('drillScrim').hidden) document.body.style.overflow = ''
    }

    $('pickBtn').addEventListener('click', openDrillSheet)
    $('drillSheetClose').addEventListener('click', closeDrillSheet)
    $('drillScrim').addEventListener('click', function (e) { if (e.target === $('drillScrim')) closeDrillSheet() })
    $('railGear').addEventListener('click', openSettings)
    $('topGear').addEventListener('click', openSettings)
    $('setClose').addEventListener('click', closeSettings)
    $('setScrim').addEventListener('click', function (e) { if (e.target === $('setScrim')) closeSettings() })
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Escape') return
      if (!$('setScrim').hidden) closeSettings()
      else if (!$('drillScrim').hidden) closeDrillSheet()
    })

    railSearch.addEventListener('input', function () { buildList(railList, railSearch.value) })
    sheetSearch.addEventListener('input', function () { buildList(sheetList, sheetSearch.value) })

    // ---- settings: accent / court style / ticker ----
    function applyAccent (c) {
      state.accent = c
      var root = document.documentElement
      root.style.setProperty('--accent', c)
      root.style.setProperty('--accent-glow', c + '66')
    }
    function buildSwatches () {
      var wrap = $('swatches')
      wrap.innerHTML = ''
      ACCENTS.forEach(function (c) {
        var b = el('button', 'swatch' + (c === state.accent ? ' sel' : ''))
        b.type = 'button'; b.style.background = c
        b.setAttribute('aria-label', 'Accent ' + c)
        b.addEventListener('click', function () { lsSet(K.accent, c); applyAccent(c); buildSwatches() })
        wrap.appendChild(b)
      })
    }
    function buildCourtSeg () {
      var wrap = $('courtSeg')
      wrap.innerHTML = ''
      ;[{ v: 'midnight', label: 'Midnight' }, { v: 'classic', label: 'Classic sand' }].forEach(function (o) {
        var b = el('button', state.courtStyle === o.v ? 'on' : '', o.label)
        b.type = 'button'
        b.addEventListener('click', function () {
          if (o.v === state.courtStyle) return
          state.courtStyle = o.v
          lsSet(K.court, o.v)
          buildCourtSeg()
          if (runner) {
            runner.courtColours = COURTS[o.v]
            var d = getDrill(state.currentId) // a warmup has no court to redraw
            if (d) runner.load(d)
          }
        })
        wrap.appendChild(b)
      })
    }
    function applyTicker () {
      $('tickerSwitch').classList.toggle('on', state.ticker)
      $('tickerToggle').setAttribute('aria-pressed', state.ticker ? 'true' : 'false')
      renderTicker()
    }
    $('tickerToggle').addEventListener('click', function () {
      state.ticker = !state.ticker
      lsSet(K.ticker, state.ticker ? '1' : '0')
      applyTicker()
    })

    // ---- deep linking ----
    window.addEventListener('hashchange', function () {
      var id = location.hash.slice(1)
      if (id && (!state.currentId || id !== state.currentId) && getItem(id)) selectItem(id, false)
    })

    // ---- boot ----
    function init () {
      applyAccent(state.accent)
      runner = new DrillPlayer({
        mountEl: courtEl,
        courtWidth: 460,
        courtColours: COURTS[state.courtStyle],
        onState: onState,
        onPhase: onPhase,
        onRep: onRep
      })
      buildSpeed()
      buildSwatches()
      buildCourtSeg()
      applyTicker()
      refreshLists()

      var fromHash = location.hash.slice(1)
      var saved = lsGet(K.drill)
      var startId = getItem(fromHash) ? fromHash
        : (getItem(saved) ? saved : (DRILLS[0] && DRILLS[0].id))
      if (startId) selectItem(startId, true)
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init)
    } else {
      init()
    }
  })()
  </script>
</body>
</html>
